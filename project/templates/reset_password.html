<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card text-center text-white">
                    <h2 class="mb-4">New Password</h2>
                    <p class="mb-4 text-white-50">Please set your new password.</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4 text-start">
                            <label class="form-label">New Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter new password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
