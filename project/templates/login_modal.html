<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg modal-custom-radius">
            <div class="modal-header bg-primary-red text-white border-bottom-0">
                <h5 class="modal-title fw-bold" id="loginModalLabel"><i class="fas fa-sign-in-alt me-2"></i> Portal
                    Login</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 bg-white">
                <form action="{% url 'login' %}" method="post" id="loginForm">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="username" class="form-label text-dark fw-bold">User ID / Username</label>
                        <input type="text" class="form-control login-input py-2" id="username" name="username"
                            placeholder="Enter your ID" required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label text-dark fw-bold">Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control login-input py-2 border-end-0" id="password"
                                name="password" required>
                            <span class="input-group-text bg-white cursor-pointer toggle-password"
                                style="border-left: none;">
                                <i class="fas fa-eye text-muted"></i>
                            </span>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4 pt-2 border-top">
                        <button type="button" class="btn btn-secondary px-3 fw-bold"
                            data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary-red px-4 fw-bold shadow-sm">Login</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
