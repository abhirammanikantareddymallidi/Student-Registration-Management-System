<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Request OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card text-center text-white">
                    <h2 class="mb-4">Reset Password</h2>
                    <p class="mb-4 text-white-50">Enter your registered email to receive a 6-digit OTP.</p>
                    
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-info alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4 text-start">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="example@outlook.com" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Send OTP</button>
                    </form>
                    <a href="{% url 'login' %}" class="btn btn-link link-light mt-3">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
