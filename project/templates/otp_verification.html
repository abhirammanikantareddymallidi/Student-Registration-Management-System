<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="login-card text-center text-white">
                    <h2 class="mb-4">OTP Verification</h2>
                    <p class="mb-4 text-white-50">Enter the 6-digit code sent to your email.</p>
                    
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4 text-start">
                            <label class="form-label">Enter OTP</label>
                            <input type="text" name="otp" class="form-control text-center" maxlength="6" style="letter-spacing: 5px; font-size: 1.5rem;" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Verify OTP</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
