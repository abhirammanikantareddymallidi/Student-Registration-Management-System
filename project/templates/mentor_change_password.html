{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0 transition-up">
                <div class="card-header bg-primary-red text-white py-3">
                    <h5 class="mb-0 fw-bold"><i class="fas fa-lock me-2"></i>Change Mentor Password</h5>
                </div>
                <div class="card-body p-4 bg-white">
                    <p class="text-muted small mb-4">
                        <i class="fas fa-info-circle me-1"></i> Update your access credentials. Your new password will be required for your next login.
                    </p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <!-- Current Password -->
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase">Current Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-key text-muted"></i></span>
                                <input type="password" name="current_password" class="form-control border-start-0 ps-0" placeholder="Enter current password" required>
                            </div>
                        </div>
                        
                        <!-- New Password -->
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-shield-alt text-muted"></i></span>
                                <input type="password" name="new_password" class="form-control border-start-0 ps-0" placeholder="Enter new password" required>
                            </div>
                        </div>
                        
                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="fas fa-check-double text-muted"></i></span>
                                <input type="password" name="confirm_password" class="form-control border-start-0 ps-0" placeholder="Confirm new password" required>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-5 border-top pt-4">
                            <a href="{% url 'mentor_dashboard' %}" class="btn btn-light px-4">
                                <i class="fas fa-arrow-left me-1"></i> Back
                            </a>
                            <button type="submit" class="btn btn-primary-red px-5 shadow-sm fw-bold">
                                <i class="fas fa-save me-1"></i> Update Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
