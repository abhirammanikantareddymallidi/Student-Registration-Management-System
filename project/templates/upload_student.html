{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-8">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary-red text-white py-3">
                    <h5 class="mb-0 fw-bold"><i class="fas fa-file-excel me-2"></i>Upload Student Excel</h5>
                </div>
                <div class="card-body p-4">
                    
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-success text-white">
                            📄 Excel Format Example
                        </div>
                        <div class="card-body">
                            <p class="text-muted">Make sure your Excel file follows this format:</p>
                            <div class="table-responsive">
                                <table class="table table-bordered text-center mb-0">
                                    <thead class="table-success">
                                        <tr>
                                            <th>Reg.No</th>
                                            <th>Student Name</th>
                                            <th>NAME OF THE COUNSELOR</th>
                                            <th>EMP ID</th>
                                            <th>Contact Number</th>
                                            <th>Email</th>
                                            <th>Specilization</th>
                                            <th>Department</th>
                                        </tr>
                                    </thead>
                                </table>
                            </div>
                        </div>
                    </div>

                    <form method="POST" enctype="multipart/form-data" action="{% url 'upload_student_excel' %}">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-bold">Select Student Excel File</label>
                            <input type="file" name="file" class="form-control" accept=".xlsx" required>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'admin_dashboard' %}" class="btn btn-light px-4">Cancel</a>
                            <button type="submit" class="btn btn-primary-red px-5 shadow-sm fw-bold">Upload</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
